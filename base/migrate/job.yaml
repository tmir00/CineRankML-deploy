apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: migrate
    app.kubernetes.io/part-of: cinerankml
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        app.kubernetes.io/part-of: cinerankml
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: migrate
          image: ghcr.io/tmir00/cinerankml-migrate:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cinerankml-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
