apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: strip-api
    app.kubernetes.io/part-of: cinerankml
spec:
  stripPrefix:
    prefixes:
      - /api
---
# API Ingress — strip /api so FastAPI sees /health, /v1/..., etc.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinerankml-api
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: cinerankml-api-ingress
    app.kubernetes.io/part-of: cinerankml
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: cinerankml-strip-api@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: cinerankml.taahaamir.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: recommender-api
                port:
                  number: 8090
---
# Frontend Ingress — no strip middleware.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinerankml-app
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: cinerankml-app-ingress
    app.kubernetes.io/part-of: cinerankml
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: cinerankml.taahaamir.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
