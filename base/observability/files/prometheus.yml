global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: ratings-consumer
    static_configs:
      - targets: ["ratings-consumer:9102"]

  - job_name: embedder-api
    static_configs:
      - targets: ["embedder-api:9110"]

  - job_name: recommender-api
    static_configs:
      - targets: ["recommender-api:9111"]

  - job_name: opensearch-exporter
    static_configs:
      - targets: ["opensearch-exporter:9114"]
