apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: cinerankml
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: http
    - name: transport
      port: 9300
      targetPort: transport
