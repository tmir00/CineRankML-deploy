apiVersion: v1
kind: Service
metadata:
  name: embedder-api
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: embedder-api
    app.kubernetes.io/part-of: cinerankml
spec:
  selector:
    app.kubernetes.io/name: embedder-api
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9110
      targetPort: metrics
