apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings-consumer
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: ratings-consumer
    app.kubernetes.io/part-of: cinerankml
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ratings-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ratings-consumer
        app.kubernetes.io/part-of: cinerankml
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: ratings-consumer
          image: ghcr.io/tmir00/cinerankml-ratings-consumer:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cinerankml-secret
                  key: DATABASE_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: RATINGS_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: RATINGS_TOPIC
            - name: RATINGS_CONSUMER_GROUP
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: RATINGS_CONSUMER_GROUP
            - name: WORKER_NAME
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: WORKER_NAME
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: LOG_LEVEL
            - name: PROGRESS_LOG_EVERY_N
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: PROGRESS_LOG_EVERY_N
            - name: METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: METRICS_PORT
          ports:
            - name: metrics
              containerPort: 9102
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
