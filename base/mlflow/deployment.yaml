apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: cinerankml
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: cinerankml
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
        app.kubernetes.io/part-of: cinerankml
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.14.0
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinerankml-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: POSTGRES_HOST
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: cinerankml-config
                  key: MLFLOW_SERVER_ALLOWED_HOSTS
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              pip install --quiet psycopg2-binary
              python - <<'PY'
              import os
              import psycopg2
              from psycopg2.extensions import ISOLATION_LEVEL_AUTOCOMMIT

              conn = psycopg2.connect(
                  host=os.environ["POSTGRES_HOST"],
                  user=os.environ["POSTGRES_USER"],
                  password=os.environ["POSTGRES_PASSWORD"],
                  dbname="postgres",
              )
              conn.set_isolation_level(ISOLATION_LEVEL_AUTOCOMMIT)
              cur = conn.cursor()
              cur.execute("SELECT 1 FROM pg_database WHERE datname = 'mlflow'")
              if cur.fetchone() is None:
                  cur.execute("CREATE DATABASE mlflow")
              cur.close()
              conn.close()
              PY
              exec mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --workers 1 \
                --allowed-hosts "${MLFLOW_SERVER_ALLOWED_HOSTS}" \
                --backend-store-uri "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/mlflow" \
                --default-artifact-root /mlflow/artifacts
          volumeMounts:
            - name: artifacts
              mountPath: /mlflow/artifacts
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              memory: 1536Mi
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts
