# VPS-friendly resource caps (single-node k3s).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: cinerankml
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: cinerankml
spec:
  template:
    spec:
      containers:
        - name: kafka
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1280Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: cinerankml
spec:
  template:
    spec:
      containers:
        - name: opensearch
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: -Xms512m -Xmx512m
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 1536Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: cinerankml
spec:
  template:
    spec:
      containers:
        - name: minio
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedder-api
  namespace: cinerankml
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: embedder-api
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommender-api
  namespace: cinerankml
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: recommender-api
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings-consumer
  namespace: cinerankml
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: ratings-consumer
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cinerankml
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
